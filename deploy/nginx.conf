# Configuration Nginx pour Adil Smart Store
# Chemin : /etc/nginx/sites-available/adilsmartstore
#
# Après avoir copié ce fichier :
#   sudo ln -s /etc/nginx/sites-available/adilsmartstore /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;

    # Remplacez par votre domaine ou IP
    server_name votre-domaine.com www.votre-domaine.com;

    # Taille maximale des uploads (images, etc.)
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/adilsmartstore_access.log;
    error_log  /var/log/nginx/adilsmartstore_error.log;

    # Tout le trafic est transmis au serveur Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Cache des fichiers statiques (images, CSS, JS)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }
}

